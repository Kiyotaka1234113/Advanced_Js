<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 12.2: Nested Namespacing Demo</title>
    <style>
        body { font-family: system-ui, sans-serif; padding: 20px; line-height: 1.6; }
        .output { background: #eef2f5; padding: 15px; border-radius: 5px; font-family: monospace; margin-bottom: 20px; border-left: 4px solid #007bff;}
    </style>
</head>
<body>
    <h1>Lab 12.2: Nested Namespacing & Library Development</h1>
    
    <h2>1. Core Architecture</h2>
    <div id="core-output" class="output"></div>

    <h2>2. Utilities (String & Array)</h2>
    <div id="utils-output" class="output"></div>

    <h2>3. Plugin System (Validation)</h2>
    <div id="plugin-output" class="output"></div>

    <script src="./namespace/core.js"></script>
    <script src="./namespace/utils.js"></script>
    <script src="./namespace/plugins.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            const coreOut = document.getElementById('core-output');
            coreOut.innerHTML = `Loaded Library: <strong>${MyApp.core.name} v${MyApp.core.version}</strong><br>
                                 Global Object: <strong>MyApp</strong> is defined.`;

            
            const utilsOut = document.getElementById('utils-output');
            const str = "hello modern javascript";
            const titleized = MyApp.utils.string.titleize(str);
            const chunkedArr = MyApp.utils.array.chunk([1, 2, 3, 4, 5, 6], 2);
            
            utilsOut.innerHTML = `String Titleize ("${str}"): <strong>${titleized}</strong><br>
                                  Array Chunking ([1,2,3,4,5,6], 2): <strong>${JSON.stringify(chunkedArr)}</strong>`;

            
            const pluginOut = document.getElementById('plugin-output');
            const testData = { email: "zhanik@example.com" };
            const validationResult = MyApp.plugins.validation.validate(testData, {
                email: { pattern: MyApp.plugins.validation.rules.email, required: true }
            });
            
            pluginOut.innerHTML = `Validating email "${testData.email}": <br>
                                   Is Valid? <strong>${validationResult.valid}</strong>`;
        });
    </script>
</body>
</html>
